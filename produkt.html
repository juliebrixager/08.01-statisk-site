<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Product</title>
    <link rel="stylesheet" href="./css/produkt.css" />
    <link rel="stylesheet" href="./css/index.css" />
    <script src="./js/produkt.js"></script>
  </head>
  <body>
    <header class="topbar">
      <a href="index.html">
        <h1 class="logo">Fashion<span class="redr">R</span>us</h1>
      </a>
      <nav>
        <ul class="menu">
          <li><a href="produktliste.html">Categories</a></li>
          <li><a href="produktliste.html">Brands</a></li>
          <li><a href="produktliste.html">Seasons</a></li>
        </ul>
      </nav>
    </header>
    <main>
      <div class="produkt_container">
        <article class="product_image">
          <img src="https://kea-alt-del.dk/t7/images/webp/640/1529.webp" alt="" />
        </article>
        <article class="productinformation">
          <h2>Product information</h2>
          <h3>Model name</h3>
          <p>Red t-shirt Ferrari</p>
          <h3>Color</h3>
          <p>Red</p>
          <h1>Ferrari</h1>
          <p>Ferrari, we are the competetion</p>
        </article>
        <article class="size_and_purchase">
          <h2>Ferrarai cotton t-shirt red</h2>
          <p>Ferrari / t-shirts</p>
          <div class="size-row">
            <label for="size">Choose a size</label>

            <select id="size">
              <option>S</option>
              <option>M</option>
              <option>L</option>
              <option>XL</option>
            </select>
          </div>
          <button class="basket-btn">Add to basket</button>
        </article>
      </div>
    </main>
    <footer></footer>
  </body>
</html>
